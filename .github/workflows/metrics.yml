name: Generate Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate compact profile metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: SHRHarry
          filename: .github/metrics/overview.svg
          template: terminal
          base: header, activity
          config_timezone: Asia/Taipei
          plugin_languages: yes
          plugin_languages_limit: 10
          plugin_languages_threshold: 0%
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_details: percentage
          plugin_languages_colors: rainbow
          plugin_languages_other: yes
          plugin_languages_recent_categories: data, markup, programming, prose
          plugin_languages_analysis_timeout: 30
          plugin_languages_categories: programming
