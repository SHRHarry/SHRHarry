name: Generate Full Languages Breakdown

on:
  schedule:
    - cron: "30 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build full languages breakdown
        uses: actions/github-script@v7
        env:
          USERNAME: SHRHarry
        with:
          github-token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const username = process.env.USERNAME;

            const query = `
              query($login: String!, $after: String) {
                user(login: $login) {
                  repositories(
                    first: 100
                    after: $after
                    ownerAffiliations: OWNER
                    orderBy: {field: PUSHED_AT, direction: DESC}
                  ) {
                    pageInfo { hasNextPage endCursor }
                    nodes {
                      isFork
                      isArchived
                      name
                      languages(first: 20, orderBy: {field: SIZE, direction: DESC}) {
                        edges {
                          size
                          node { name color }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const totals = new Map();
            let after = null;

            while (true) {
              const data = await github.graphql(query, { login: username, after });
              const repos = data.user.repositories.nodes || [];

              for (const repo of repos) {
                if (repo.isFork || repo.isArchived) continue;
                for (const edge of repo.languages.edges || []) {
                  const name = edge.node.name;
                  const size = edge.size || 0;
                  const color = edge.node.color || "#888888";
                  const current = totals.get(name) || { size: 0, color };
                  current.size += size;
                  if (!current.color && color) current.color = color;
                  totals.set(name, current);
                }
              }

              const pageInfo = data.user.repositories.pageInfo;
              if (!pageInfo.hasNextPage) break;
              after = pageInfo.endCursor;
            }

            const items = [...totals.entries()]
              .map(([name, v]) => ({ name, size: v.size, color: v.color }))
              .sort((a, b) => b.size - a.size);

            const totalSize = items.reduce((sum, i) => sum + i.size, 0);
            const withPct = items.map(i => ({
              ...i,
              percentage: totalSize > 0 ? Number(((i.size / totalSize) * 100).toFixed(4)) : 0
            }));

            const jsonOut = {
              generated_at: new Date().toISOString(),
              total_languages: withPct.length,
              total_bytes: totalSize,
              languages: withPct
            };

            const mdLines = [];
            mdLines.push("# Full Languages Breakdown");
            mdLines.push("");
            mdLines.push(`Generated: ${jsonOut.generated_at}`);
            mdLines.push(`Total languages: ${jsonOut.total_languages}`);
            mdLines.push("");
            mdLines.push("| Language | Percentage | Bytes |");
            mdLines.push("|---|---:|---:|");
            for (const l of withPct) {
              mdLines.push(`| ${l.name} | ${l.percentage}% | ${l.size} |`);
            }
            mdLines.push("");

            fs.mkdirSync(".github/metrics", { recursive: true });
            fs.writeFileSync(".github/metrics/languages-full.json", JSON.stringify(jsonOut, null, 2));
            fs.writeFileSync(".github/metrics/languages-full.md", mdLines.join("\n"));

      - name: Commit breakdown files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/metrics/languages-full.json .github/metrics/languages-full.md
          git diff --cached --quiet || git commit -m "Update full languages breakdown [skip ci]"
          git push
